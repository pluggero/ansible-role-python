---
python_version: "3.14.5"
python_install_method: "dynamic"
python_force_install: false

python_archive_name: "Python-{{ python_version }}.tgz"
python_download_url: "https://www.python.org/ftp/python/{{ python_version }}/{{ python_archive_name }}"
python_download_dir: "/tmp"

python_install_dir: "/opt"
python_install_path: "{{ python_install_dir }}/python-{{ python_version }}"

# User-specific tool paths
python_tool_install_dir: ".local/bin"
python_tool_install_path: "{{ ansible_env.HOME }}/{{ python_tool_install_dir }}"
python_tool_venv_dir: "{{ ansible_env.HOME }}/.local/venvs"
python_tool_version_file_path: "{{ python_tool_install_path }}/.versions"

# System-wide tool paths
python_tool_system_bin: "/usr/local/bin"
python_tool_system_venv_dir: "/opt/python-tools/venvs"
python_tool_system_version_file: "/opt/python-tools/.versions"

python_tools: []
  # - package: "frida-tools"
  #   version: "latest"
  #   install_scope: "user"  # Optional: "user" (default) or "system". Controls where the tool is installed
  #   venv_name: "frida-tools"  # Optional: defaults to package name. Use same venv_name to install multiple packages in one venv
  #   executables: ["frida", "frida-ps", "frida-trace"]
  #   tool_dependencies:
  #     Alpine: ["npm", "git", "make", "gcc", "musl-dev"]
  # Example: System-wide installation
  # - package: "black"
  #   version: "latest"
  #   install_scope: "system"  # Available to all users in /usr/local/bin
  #   executables: ["black"]
  # Example: Multiple packages in one venv
  # - package: "objection"
  #   version: "1.11.0"
  #   venv_name: "mobile-security"
  #   install_scope: "user"
  #   executables: ["objection"]
  # - package: "frida-tools"
  #   version: "13.7.1"
  #   venv_name: "mobile-security"
  #   install_scope: "user"
  #   executables: ["frida", "frida-ps", "frida-trace"]

# Python installer URL (shared for both Unix and Windows)
python_installer_url: "https://www.python.org/ftp/python/{{ python_version }}"

# Python installer names (platform-specific)
python_installer_name_unix: "Python-{{ python_version }}.tgz"
python_installer_name_windows: "python-{{ python_version }}-amd64.exe"

# Python download directories (platform-specific)
python_download_dir_unix: "/tmp"
python_download_dir_windows: "C:\\Windows\\Temp"

# Python installation base paths
python_install_base_unix: "/opt"
python_install_base_windows: "C:\\Program Files"
python_install_path_windows: "{{ python_install_base_windows }}\\Python{{ python_version.split('.')[0] }}{{ python_version.split('.')[1] }}"

# Windows tool paths - User-scoped
python_tool_user_base_windows: "{{ ansible_env.LOCALAPPDATA }}\\Programs\\Python\\PythonTools"
python_tool_user_venv_dir_windows: "{{ python_tool_user_base_windows }}\\venvs"
python_tool_user_bin_windows: "{{ python_tool_user_base_windows }}\\bin"
python_tool_user_version_file_windows: "{{ python_tool_user_bin_windows }}\\.versions"

# Windows tool paths - System-scoped
python_tool_system_base_windows: "C:\\ProgramData\\PythonTools"
python_tool_system_venv_dir_windows: "{{ python_tool_system_base_windows }}\\venvs"
python_tool_system_bin_windows: "{{ python_tool_system_base_windows }}\\bin"
python_tool_system_version_file_windows: "{{ python_tool_system_base_windows }}\\.versions"

---
# Common logic for installing Python tools on Windows (both user and system scope)
# Requires the following variables to be set by the caller:
#   - scope_tools: List of tools to install
#   - scope_venv_dir: Directory for virtual environments
#   - scope_bin_dir: Directory for wrapper scripts
#   - scope_version_file: Path to version tracking file
#   - scope_become: Boolean - whether to use privilege escalation
#   - scope_name: String - "user" or "system" (for variable naming)

- name: Check if version file exists (Windows) - {{ scope_name }}
  ansible.windows.win_stat:
    path: "{{ scope_version_file }}"
  register: scope_version_file_stat
  become: "{{ scope_become }}"
  become_method: "{{ 'ansible.builtin.runas' if scope_become else omit }}"
  become_user: "{{ ansible_user if scope_become else omit }}"

- name: Read Python tool version file (Windows) - {{ scope_name }}
  ansible.builtin.slurp:
    src: "{{ scope_version_file }}"
  register: scope_version_file_content
  when: scope_version_file_stat.stat.exists
  become: "{{ scope_become }}"
  become_method: "{{ 'ansible.builtin.runas' if scope_become else omit }}"
  become_user: "{{ ansible_user if scope_become else omit }}"

- name: Parse Python tool versions (Windows) - {{ scope_name }}
  ansible.builtin.set_fact:
    "{{ scope_name }}_installed_versions": "{{ (scope_version_file_content.content | b64decode | from_json) if scope_version_file_stat.stat.exists else {} }}"

- name: Group tools by venv_name (Windows) - {{ scope_name }}
  ansible.builtin.set_fact:
    "{{ scope_name }}_tools_by_venv": "{{ scope_tools | groupby('venv_name') | items2dict(key_name=0, value_name=1) }}"

- name: Determine which venvs need updates (Windows) - {{ scope_name }}
  ansible.builtin.set_fact:
    "{{ scope_name }}_venvs_to_update": >-
      {%- set venvs_to_update = [] -%}
      {%- set installed_versions = lookup('vars', scope_name + '_installed_versions') -%}
      {%- set tools_by_venv = lookup('vars', scope_name + '_tools_by_venv') -%}
      {%- for venv_name, tools in tools_by_venv.items() -%}
        {%- for tool in tools -%}
          {%- set version_key = tool.package + '@' + tool.venv_name -%}
          {%- if version_key not in installed_versions or installed_versions[version_key] != tool.version -%}
            {%- if venv_name not in venvs_to_update -%}
              {%- set _ = venvs_to_update.append(venv_name) -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ venvs_to_update }}

- name: Create venv directories (Windows) - {{ scope_name }}
  ansible.windows.win_file:
    path: "{{ scope_venv_dir }}\\{{ venv_name }}"
    state: directory
  loop: "{{ lookup('vars', scope_name + '_venvs_to_update') }}"
  loop_control:
    loop_var: venv_name
  become: "{{ scope_become }}"
  become_method: "{{ 'ansible.builtin.runas' if scope_become else omit }}"
  become_user: "{{ ansible_user if scope_become else omit }}"

- name: Create virtual environments (Windows) - {{ scope_name }}
  ansible.windows.win_command:
    cmd: '"{{ python_executable_windows }}" -m venv "{{ scope_venv_dir }}\\{{ venv_name }}\\venv"'
    creates: "{{ scope_venv_dir }}\\{{ venv_name }}\\venv\\Scripts\\python.exe"
  loop: "{{ lookup('vars', scope_name + '_venvs_to_update') }}"
  loop_control:
    loop_var: venv_name
  become: "{{ scope_become }}"
  become_method: "{{ 'ansible.builtin.runas' if scope_become else omit }}"
  become_user: "{{ ansible_user if scope_become else omit }}"

- name: Install all packages for each venv (Windows) - {{ scope_name }}
  ansible.windows.win_command:
    cmd: >-
      {{ scope_venv_dir }}\{{ venv_name }}\venv\Scripts\pip.exe install{%- set tools_by_venv = lookup('vars', scope_name + '_tools_by_venv') -%}
      {%- for tool in tools_by_venv[venv_name] -%}
      {{ ' ' }}{{ tool.package }}{{ '==' + tool.version if tool.version != 'latest' else '' }}
      {%- endfor %}
  loop: "{{ lookup('vars', scope_name + '_venvs_to_update') }}"
  loop_control:
    loop_var: venv_name
  become: "{{ scope_become }}"
  become_method: "{{ 'ansible.builtin.runas' if scope_become else omit }}"
  become_user: "{{ ansible_user if scope_become else omit }}"

- name: Create wrapper scripts for tool binaries (Windows) - {{ scope_name }}
  ansible.windows.win_template:
    src: tool-wrapper.bat.j2
    dest: "{{ scope_bin_dir }}\\{{ executable }}.bat"
  loop: "{{ scope_tools | subelements('executables') }}"
  loop_control:
    loop_var: tool_executable
  vars:
    tool: "{{ tool_executable[0] }}"
    executable: "{{ tool_executable[1] }}"
    venv_path: "{{ scope_venv_dir }}\\{{ tool.venv_name }}\\venv"
  become: "{{ scope_become }}"
  become_method: "{{ 'ansible.builtin.runas' if scope_become else omit }}"
  become_user: "{{ ansible_user if scope_become else omit }}"

- name: Update installed versions (Windows) - {{ scope_name }}
  ansible.builtin.set_fact:
    "{{ scope_name }}_installed_versions": "{{ lookup('vars', scope_name + '_installed_versions') | combine({tool.package + '@' + tool.venv_name: tool.version}) }}"
  loop: "{{ scope_tools }}"
  loop_control:
    loop_var: tool

- name: Update tool version file (Windows) - {{ scope_name }}
  ansible.windows.win_copy:
    content: "{{ lookup('vars', scope_name + '_installed_versions') | to_nice_json }}"
    dest: "{{ scope_version_file }}"
  become: "{{ scope_become }}"
  become_method: "{{ 'ansible.builtin.runas' if scope_become else omit }}"
  become_user: "{{ ansible_user if scope_become else omit }}"

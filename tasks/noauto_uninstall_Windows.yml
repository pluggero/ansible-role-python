---
- name: Uninstall Python on Windows
  block:
    - name: Get Python uninstall string from registry
      ansible.windows.win_shell: |
        $pythonVersion = "{{ python_installed_version }}"
        $uninstallKey = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*" |
          Where-Object { $_.DisplayName -like "Python $pythonVersion*" } |
          Select-Object -First 1
        if ($uninstallKey) {
          $uninstallKey.UninstallString
        }
      register: python_uninstall_string
      when: python_installed_version is defined and python_installed_version != ""
      changed_when: false
      failed_when: false

    - name: Uninstall Python using uninstall string
      ansible.windows.win_command:
        cmd: '{{ python_uninstall_string.stdout | trim }} /quiet'
      when:
        - python_installed_version is defined
        - python_installed_version != ""
        - python_uninstall_string.stdout is defined
        - python_uninstall_string.stdout | trim | length > 0
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      failed_when: false

    - name: Uninstall Python via Chocolatey (fallback)
      chocolatey.chocolatey.win_chocolatey:
        name: "{{ package }}"
        state: absent
      loop: "{{ python_distro_pkgs }}"
      loop_control:
        loop_var: package
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      failed_when: false

    - name: Remove Python installation directory
      ansible.windows.win_file:
        path: "{{ python_install_path_windows }}"
        state: absent
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      failed_when: false
